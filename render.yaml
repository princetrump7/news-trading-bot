services:
  - type: web
    name: news-trading-bot
    runtime: python
    repo: https://github.com/princ/news-trading-bot
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_BASE_URL
        value: https://openrouter.ai/api/v1
      - key: LLM_MODEL
        value: openrouter/free
      - key: OPENROUTER_REFERER
        value: https://github.com/princ/news-trading-bot
      - key: OPENROUTER_TITLE
        value: News Trading Bot
